<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasil Kelulusan - LULUS - SICEPU</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .result-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
      background: linear-gradient(135deg, #0F172A 0%, #166534 50%, #0F172A 100%);
    }
    
    .result-card {
      width: 100%;
      max-width: 600px;
      padding: var(--space-8);
      border-radius: var(--radius-xl);
      text-align: center;
      position: relative;
      margin-top: var(--space-6);
      /* Success Glow */
      box-shadow: 0 0 40px rgba(22, 163, 74, 0.3);
      animation: slide-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes slide-up {
      0% { transform: translateY(50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    .status-badge {
      display: inline-block;
      padding: var(--space-4) var(--space-8);
      background: rgba(22, 163, 74, 0.2);
      border: 2px solid var(--color-success);
      color: var(--color-success);
      font-size: var(--text-4xl);
      font-weight: 800;
      border-radius: var(--radius-lg);
      margin: var(--space-4) 0;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px rgba(22, 163, 74, 0.5);
    }
    
    .mhs-info {
      text-align: left;
      margin-top: var(--space-6);
      padding: var(--space-4);
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
    }
    
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      margin-top: var(--space-6);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    th, td {
      padding: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    
    th {
      background: rgba(30, 41, 59, 0.5);
      color: var(--color-text);
      font-weight: 600;
    }
    
    tbody tr:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .btn-success {
      background: linear-gradient(90deg, #16A34A 0%, #15803D 100%);
      color: white;
    }

    .btn-success:hover {
      box-shadow: 0 0 20px rgba(22, 163, 74, 0.4);
      transform: translateY(-2px);
    }
    
    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
  </style>
</head>
<body class="result-page">
  <canvas id="confetti-canvas"></canvas>

  <div class="glass result-card" id="print-area">
    <div class="text-center">
      <h2 class="text-white">SELAMAT!</h2>
      <p>Anda dinyatakan...</p>
      
      <div class="status-badge">
        LULUS
      </div>
    </div>

    <div class="mhs-info">
      <p class="text-white"><strong>Nama :</strong> <span id="student-name">Ahmad Rizky Pratama</span></p>
      <p class="text-white mt-2"><strong>NISN :</strong> <span id="student-nisn">0012345678</span></p>
      <p class="text-white mt-2"><strong>Kelas :</strong> <span id="student-kelas">XII IPA 2</span></p>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Mata Pelajaran</th>
            <th>Nilai</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="grades-body">
          <tr>
            <td class="text-white">Bahasa Indonesia</td>
            <td class="text-white" id="grade-bindo">85</td>
            <td class="text-success" id="status-bindo">Kompeten</td>
          </tr>
          <tr>
            <td class="text-white">Matematika</td>
            <td class="text-white" id="grade-mtk">78</td>
            <td class="text-success" id="status-mtk">Kompeten</td>
          </tr>
          <tr>
            <td class="text-white">Bahasa Inggris</td>
            <td class="text-white" id="grade-bing">82</td>
            <td class="text-success" id="status-bing">Kompeten</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-8" style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;" id="action-buttons">
      <button class="btn btn-success" id="download-btn">
        <i data-lucide="file-down"></i> Download SKL
      </button>
      <button class="btn glass" onclick="window.print()">
        <i data-lucide="printer"></i> Cetak Hasil
      </button>
    </div>
  </div>

  <div class="mt-6">
    <a href="/index.html" class="text-primary" style="text-decoration: none; font-size: var(--text-sm); display: inline-flex; align-items: center; gap: 0.25rem;">
      <i data-lucide="arrow-left" size="16"></i> Kembali ke Beranda
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="/src/pdf-generator.js"></script>
  <script>
    lucide.createIcons();
    // Trigger confetti
    var duration = 3 * 1000;
    var end = Date.now() + duration;

    (function frame() {
      // launch a few confetti from the left edge
      confetti({
        particleCount: 7,
        angle: 60,
        spread: 55,
        origin: { x: 0 },
        colors: ['#2563EB', '#16A34A', '#F59E0B']
      });
      // and launch a few from the right edge
      confetti({
        particleCount: 7,
        angle: 120,
        spread: 55,
        origin: { x: 1 },
        colors: ['#2563EB', '#16A34A', '#F59E0B']
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    }());

    // Load student data
    document.addEventListener('DOMContentLoaded', () => {
      const studentData = sessionStorage.getItem('current_student');
      if (!studentData) {
        window.location.href = '/index.html';
        return;
      }

      const student = JSON.parse(studentData);
      document.getElementById('student-name').innerText = student.nama || '-';
      document.getElementById('student-nisn').innerText = student.nisn || '-';
      document.getElementById('student-kelas').innerText = student.kelas || '-';

      const updateGrade = (subject, score) => {
        document.getElementById(`grade-${subject}`).innerText = score !== undefined ? score : '-';
        const statusElem = document.getElementById(`status-${subject}`);
        if(score >= 75) {
          statusElem.innerText = 'Kompeten';
          statusElem.className = 'text-success';
        } else {
          statusElem.innerText = 'Belum Kompeten';
          statusElem.className = 'text-danger';
        }
      };

      updateGrade('bindo', student.nilai_bindo);
      updateGrade('mtk', student.nilai_mtk);
      updateGrade('bing', student.nilai_bing);
    });
  </script>
</body>
</html>
