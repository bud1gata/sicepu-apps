<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - SICEPU</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/src/admin-styles.css">
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i data-lucide="shield" class="text-primary"></i>
      <h2 class="text-white text-lg">SICEPU Admin</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item active">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a href="/admin/students.html" class="nav-item">
        <i data-lucide="users"></i> Data Siswa
      </a>
      <a href="/admin/upload.html" class="nav-item">
        <i data-lucide="upload-cloud"></i> Upload Data
      </a>
      <a href="/admin/settings-time.html" class="nav-item">
        <i data-lucide="clock"></i> Pengaturan Waktu
      </a>
      <a href="/admin/logs.html" class="nav-item">
        <i data-lucide="list"></i> Log Akses
      </a>
      <a href="/admin/settings-general.html" class="nav-item">
        <i data-lucide="settings"></i> Pengaturan Umum
      </a>
    </nav>
    <div style="padding: var(--space-6); border-top: 1px solid var(--color-border);">
      <a href="#" id="logout-btn" class="nav-item" style="padding: 0; color: var(--color-danger); border: none;" onclick="sessionStorage.removeItem('admin_token'); window.location.href='/admin/login.html';">
        <i data-lucide="log-out"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-8);">
      <h1 class="text-white">Dashboard Overview</h1>
      <span class="text-muted text-sm" id="current-time"></span>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <h3>Total Siswa</h3>
        <div class="value" id="stat-total">-</div>
      </div>
      <div class="stat-card border-success">
        <h3>Sudah Cek</h3>
        <div class="value text-success" id="stat-checked">-</div>
      </div>
      <div class="stat-card">
        <h3>Success Rate Lulus</h3>
        <div class="value text-primary" id="stat-rate">-</div>
      </div>
      <div class="stat-card border-warning">
        <h3>Belum Cek</h3>
        <div class="value text-warning" id="stat-unchecked">-</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <h3 class="text-white mb-2"><i data-lucide="activity" style="display:inline; vertical-align:middle; margin-right:8px;"></i> Grafik Akses Per Jam</h3>
      <div class="bar-chart" id="bar-chart">
        <!-- Bars will be populated via JS -->
      </div>
    </div>

    <!-- Logs -->
    <div class="chart-container">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 class="text-white"><i data-lucide="list" style="display:inline; vertical-align:middle; margin-right:8px;"></i> Log Akses Terakhir</h3>
        <button id="refresh-btn" class="btn" style="padding: var(--space-2) var(--space-3); background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text);">Refresh</button>
      </div>
      
      <table class="log-table">
        <thead>
          <tr>
            <th>Waktu</th>
            <th>NISN</th>
            <th>Status Cek</th>
            <th>IP Address</th>
          </tr>
        </thead>
        <tbody class="text-white" id="log-body">
          <tr><td colspan="4" style="text-align:center; color: var(--color-text-muted);">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script>
    const API_BASE = 'http://127.0.0.1:3000/api/dashboard';

    lucide.createIcons();

    // Live timer
    setInterval(() => {
      const now = new Date();
      document.getElementById('current-time').innerText = now.toLocaleString('id-ID');
    }, 1000);

    // Fetch stats
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        const json = await res.json();
        if (json.success) {
          const d = json.data;
          document.getElementById('stat-total').innerText = d.totalStudents;
          document.getElementById('stat-checked').innerText = d.sudahCek;
          document.getElementById('stat-rate').innerText = d.passRate + '%';
          document.getElementById('stat-unchecked').innerText = d.belumCek;
        }
      } catch (e) { console.error('Stats error', e); }
    }

    // Fetch logs
    async function loadLogs() {
      try {
        const res = await fetch(`${API_BASE}/logs`);
        const json = await res.json();
        const tbody = document.getElementById('log-body');
        if (json.success && json.data.length > 0) {
          tbody.innerHTML = json.data.map(log => {
            const time = new Date(log.createdAt).toLocaleTimeString('id-ID');
            const isLulus = log.status === 'LULUS';
            const isNotFound = log.status === 'NOT_FOUND';
            let badge = '';
            if (isNotFound) {
              badge = `<span class="text-muted"><i data-lucide="help-circle" size="14"></i> Not Found</span>`;
            } else if (isLulus) {
              badge = `<span class="text-success"><i data-lucide="check-circle" size="14"></i> Lulus</span>`;
            } else {
              badge = `<span class="text-danger"><i data-lucide="x-circle" size="14"></i> Tidak Lulus</span>`;
            }
            return `<tr><td>${time}</td><td>${log.nisn}</td><td>${badge}</td><td>${log.ip}</td></tr>`;
          }).join('');
          lucide.createIcons();
        } else {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--color-text-muted);">Belum ada log akses.</td></tr>';
        }
      } catch (e) { console.error('Logs error', e); }
    }

    // Fetch hourly chart
    async function loadHourly() {
      try {
        const res = await fetch(`${API_BASE}/hourly`);
        const json = await res.json();
        const chart = document.getElementById('bar-chart');
        if (json.success) {
          const max = Math.max(...json.data.map(h => h.count), 1);
          chart.innerHTML = json.data.map(h => {
            const pct = Math.max((h.count / max) * 100, 2);
            return `<div class="bar" style="height: ${pct}%;" title="${h.hour}:00 - ${h.count} akses"></div>`;
          }).join('');
        }
      } catch (e) { console.error('Hourly error', e); }
    }

    // Refresh button
    document.getElementById('refresh-btn').addEventListener('click', () => {
      loadStats();
      loadLogs();
      loadHourly();
    });

    // Initial load
    loadStats();
    loadLogs();
    loadHourly();
  </script>
  <script src="/admin/js/auth-guard.js"></script>
</body>
</html>
