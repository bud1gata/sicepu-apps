<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - SICEPU</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/src/admin-styles.css">
</head>
<body class="admin-login">

  <div class="login-card">
    <div class="text-center mb-6">
      <i data-lucide="shield" class="text-primary mb-2 mx-auto" style="width: 48px; height: 48px;"></i>
      <h2 class="text-white">Panel Administrator</h2>
    </div>

    <form id="login-form">
      <div class="mb-4">
        <label class="form-label text-sm text-white" for="username">Username:</label>
        <div style="position: relative;">
          <input type="text" id="username" class="form-control" style="padding-left: 2.5rem;" required>
          <i data-lucide="user" class="text-primary" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px;"></i>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-sm text-white" for="password">Password:</label>
        <div style="position: relative;">
          <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" required>
          <i data-lucide="lock" class="text-primary" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px;"></i>
        </div>
      </div>

      <div id="error-msg" style="display:none; color: var(--color-danger); font-size: 0.875rem; margin-bottom: 1rem; text-align: center;"></div>

      <button type="submit" id="login-btn" class="btn btn-primary w-full">
        <i data-lucide="log-in"></i> MASUK
      </button>
    </form>
    
    <div class="text-center mt-6">
      <p class="text-xs text-muted">&copy; 2026 SICEPU v1.0</p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> MEMPROSES...';
      lucide.createIcons();

      try {
        const res = await fetch('http://127.0.0.1:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('admin_token', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorMsg.innerText = data.message || 'Login gagal';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="log-in"></i> MASUK';
          lucide.createIcons();
        }
      } catch (err) {
        errorMsg.innerText = 'Terjadi kesalahan koneksi ke server';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in"></i> MASUK';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
