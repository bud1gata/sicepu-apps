<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan Umum - SICEPU Admin</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/admin/js/auth-guard.js"></script>
  <link rel="stylesheet" href="/src/admin-styles.css">
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i data-lucide="shield" class="text-primary"></i>
      <h2 class="text-white text-lg">SICEPU Admin</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a href="/admin/students.html" class="nav-item">
        <i data-lucide="users"></i> Data Siswa
      </a>
      <a href="/admin/upload.html" class="nav-item">
        <i data-lucide="upload-cloud"></i> Upload Data
      </a>
      <a href="/admin/settings-time.html" class="nav-item">
        <i data-lucide="clock"></i> Pengaturan Waktu
      </a>
      <a href="/admin/logs.html" class="nav-item">
        <i data-lucide="list"></i> Log Akses
      </a>
      <a href="/admin/settings-general.html" class="nav-item active">
        <i data-lucide="settings"></i> Pengaturan Umum
      </a>
    </nav>
    <div style="padding: var(--space-6); border-top: 1px solid var(--color-border);">
      <a href="#" class="nav-item" style="padding: 0; color: var(--color-danger); border: none;" onclick="sessionStorage.removeItem('admin_token'); window.location.href='/admin/login.html';">
        <i data-lucide="log-out"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <h1 class="text-white" style="margin-bottom: var(--space-8);">Pengaturan Umum</h1>

    <div class="settings-card">
      <h3 class="text-white mb-4">Ubah Password Admin</h3>
      <form id="password-form">
        <div class="form-group">
          <label for="oldPassword">Password Lama</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="form-group">
          <label for="newPassword">Password Baru</label>
          <input type="password" id="newPassword" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Konfirmasi Password Baru</label>
          <input type="password" id="confirmPassword" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary" id="save-btn" style="margin-top: var(--space-4); width: 100%;">
          GANTI PASSWORD
        </button>

        <div id="alert-msg" class="alert"></div>
      </form>
    </div>
  </main>

  <script>
    lucide.createIcons();

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const oldPassword = document.getElementById('oldPassword').value;
      
      const alertElem = document.getElementById('alert-msg');
      
      if (newPassword !== confirmPassword) {
        alertElem.style.display = 'block';
        alertElem.className = 'alert error';
        alertElem.innerText = '❌ Password baru dan konfirmasi tidak cocok!';
        return;
      }

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.innerText = 'MEMPROSES...';

      try {
        const token = sessionStorage.getItem('admin_token');
        const res = await fetch('http://127.0.0.1:3000/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, oldPassword, newPassword })
        });
        
        const json = await res.json();
        
        alertElem.style.display = 'block';
        if (json.success) {
          alertElem.className = 'alert success';
          alertElem.innerText = '✅ Password berhasil diubah. Silakan login kembali dengan password baru Anda.';
          // Clear form
          document.getElementById('password-form').reset();
          
          // Optionally logout after 3 seconds
          setTimeout(() => {
            sessionStorage.removeItem('admin_token');
            window.location.href = '/admin/login.html';
          }, 3000);
          
        } else {
          alertElem.className = 'alert error';
          alertElem.innerText = '❌ Gagal: ' + json.message;
        }
      } catch (err) {
        alertElem.style.display = 'block';
        alertElem.className = 'alert error';
        alertElem.innerText = '❌ Terjadi kesalahan jaringan';
      } finally {
        btn.disabled = false;
        btn.innerText = 'GANTI PASSWORD';
      }
    });
  </script>
</body>
</html>
