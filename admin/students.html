<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Siswa - SICEPU Admin</title>
  <link rel="stylesheet" href="/src/styles.css">
  <link rel="stylesheet" href="/src/admin-styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/admin/js/auth-guard.js"></script>
  <style>
    /* Table specific styles for students */
    .table-container {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-top: var(--space-6);
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-4);
    }
    
    .data-table th, .data-table td {
      padding: var(--space-3);
      border-bottom: 1px solid var(--color-border);
      text-align: left;
    }
    
    .data-table th {
      color: var(--color-text-muted);
      font-weight: 500;
      background: rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    .data-table tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .badge {
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-success { background: rgba(22, 163, 74, 0.2); color: var(--color-success); }
    .badge-danger { background: rgba(220, 38, 38, 0.2); color: var(--color-danger); }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      padding: 0.25rem;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--color-text);
    }
    .action-btn.delete:hover {
      color: var(--color-danger);
      background: rgba(239, 68, 68, 0.1);
    }
    .action-btn.edit:hover {
      color: var(--color-primary);
      background: rgba(37, 99, 235, 0.1);
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      width: 100%;
      max-width: 500px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
    }

    .modal-header h2 {
      margin: 0;
      color: var(--color-text);
      font-size: 1.25rem;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 0.25rem;
    }

    .close-btn:hover {
      color: var(--color-text);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
  </style>
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i data-lucide="shield" class="text-primary"></i>
      <h2 class="text-white text-lg">SICEPU Admin</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="nav-item">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a href="/admin/students.html" class="nav-item active">
        <i data-lucide="users"></i> Data Siswa
      </a>
      <a href="/admin/upload.html" class="nav-item">
        <i data-lucide="upload-cloud"></i> Upload Data
      </a>
      <a href="/admin/settings-time.html" class="nav-item">
        <i data-lucide="clock"></i> Pengaturan Waktu
      </a>
      <a href="/admin/logs.html" class="nav-item">
        <i data-lucide="list"></i> Log Akses
      </a>
      <a href="/admin/settings-general.html" class="nav-item">
        <i data-lucide="settings"></i> Pengaturan Umum
      </a>
    </nav>
    <div style="padding: var(--space-6); border-top: 1px solid var(--color-border);">
      <a href="#" class="nav-item" style="padding: 0; color: var(--color-danger); border: none;" onclick="sessionStorage.removeItem('admin_token'); window.location.href='/admin/login.html';">
        <i data-lucide="log-out"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-8);">
      <div>
        <h1 class="text-white">Kelola Data Siswa</h1>
        <p class="text-muted">Lihat, edit, dan hapus data kelulusan siswa secara individual.</p>
      </div>
      <div>
        <a href="/admin/upload.html" class="btn btn-primary" style="text-decoration: none;">
          <i data-lucide="plus" size="16"></i> Tambah Data (Upload)
        </a>
      </div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <div style="position: relative; width: 300px;">
          <input type="text" id="search-input" class="form-control" placeholder="Cari NISN atau Nama..." style="padding-left: 2.5rem;">
          <i data-lucide="search" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 16px; color: var(--color-text-muted);"></i>
        </div>
        <button id="refresh-btn" class="btn" style="padding: 0.5rem; background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text);">
          <i data-lucide="refresh-cw" size="16"></i>
        </button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>NISN</th>
            <th>Nama Siswa</th>
            <th>Kelas</th>
            <th>Tgl Lahir</th>
            <th>B. Indo</th>
            <th>MTK</th>
            <th>B. Ing</th>
            <th>Status</th>
            <th style="text-align: right;">Aksi</th>
          </tr>
        </thead>
        <tbody class="text-white" id="students-body">
          <tr><td colspan="9" style="text-align:center; padding: 2rem;"><i data-lucide="loader-2" class="spin"></i> Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Data Siswa</h2>
        <button class="close-btn" onclick="closeEditModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>NISN</label>
          <input type="text" id="edit-nisn" required>
        </div>
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="edit-nama" required>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Tanggal Lahir (YYYY-MM-DD)</label>
            <input type="date" id="edit-tgl-lahir" required>
          </div>
          <div class="form-group">
            <label>Kelas</label>
            <input type="text" id="edit-kelas">
          </div>
        </div>
        <div class="grid-2">
           <div class="form-group">
            <label>Nilai B. Indo</label>
            <input type="number" step="0.01" id="edit-bindo">
          </div>
          <div class="form-group">
            <label>Nilai MTK</label>
            <input type="number" step="0.01" id="edit-mtk">
          </div>
        </div>
        <div class="grid-2">
           <div class="form-group">
            <label>Nilai B. Inggris</label>
            <input type="number" step="0.01" id="edit-bing">
          </div>
          <div class="form-group">
            <label>Status Kelulusan</label>
            <select id="edit-status" class="form-control" style="width: 100%; color-scheme: dark;">
              <option value="LULUS">LULUS</option>
              <option value="TIDAK LULUS">TIDAK LULUS</option>
            </select>
          </div>
        </div>
        
        <div id="edit-alert" class="alert" style="margin-top: 0; margin-bottom: 1rem;"></div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
          <button type="button" class="btn" style="background: transparent; color: var(--color-text);" onclick="closeEditModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="save-edit-btn">Simpan Perubahan</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    let allStudents = [];
    
    async function fetchStudents() {
      const tbody = document.getElementById('students-body');
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding: 2rem;"><i data-lucide="loader-2" class="spin"></i> Memuat data...</td></tr>';
      lucide.createIcons();
      
      try {
        const res = await fetch('http://127.0.0.1:3000/api/students');
        const json = await res.json();
        
        if (json.success) {
          allStudents = json.data;
          renderStudents(allStudents);
        } else {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color: var(--color-danger);">${json.message || 'Gagal memuat data'}</td></tr>`;
        }
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color: var(--color-danger);">Kesalahan jaringan</td></tr>';
      }
    }

    function renderStudents(data) {
      const tbody = document.getElementById('students-body');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color: var(--color-text-muted); padding: 2rem;">Tidak ada data siswa ditemukan</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(s => {
        const statusBadge = s.status === 'LULUS' 
          ? '<span class="badge badge-success">LULUS</span>' 
          : '<span class="badge badge-danger">TIDAK LULUS</span>';
          
        // Safe escape for JSON string in HTML handler
        const studentJson = JSON.stringify(s).replace(/"/g, '&quot;');
          
        return `
          <tr>
            <td>${s.nisn}</td>
            <td>${s.nama}</td>
            <td>${s.kelas || '-'}</td>
            <td>${s.tgl_lahir}</td>
            <td>${s.nilai_bindo || 0}</td>
            <td>${s.nilai_mtk || 0}</td>
            <td>${s.nilai_bing || 0}</td>
            <td>${statusBadge}</td>
            <td style="text-align: right; white-space: nowrap;">
              <button class="action-btn edit" onclick="openEditModal('${studentJson}')" title="Edit">
                <i data-lucide="edit" size="16"></i>
              </button>
              <button class="action-btn delete" onclick="deleteStudent('${s._id}')" title="Hapus">
                <i data-lucide="trash-2" size="16"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }

    // Search functionality
    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allStudents.filter(s => 
        s.nisn.toLowerCase().includes(term) || 
        s.nama.toLowerCase().includes(term) ||
        (s.kelas && s.kelas.toLowerCase().includes(term))
      );
      renderStudents(filtered);
    });

    document.getElementById('refresh-btn').addEventListener('click', fetchStudents);

    // Edit Modal Logic
    const modal = document.getElementById('edit-modal');
    
    window.openEditModal = function(studentDataString) {
      const student = JSON.parse(studentDataString);
      document.getElementById('edit-id').value = student._id;
      document.getElementById('edit-nisn').value = student.nisn;
      document.getElementById('edit-nama').value = student.nama;
      document.getElementById('edit-tgl-lahir').value = student.tgl_lahir;
      document.getElementById('edit-kelas').value = student.kelas || '';
      document.getElementById('edit-bindo').value = student.nilai_bindo || 0;
      document.getElementById('edit-mtk').value = student.nilai_mtk || 0;
      document.getElementById('edit-bing').value = student.nilai_bing || 0;
      document.getElementById('edit-status').value = student.status;
      
      document.getElementById('edit-alert').style.display = 'none';
      modal.classList.add('active');
    };

    window.closeEditModal = function() {
      modal.classList.remove('active');
    };

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const btn = document.getElementById('save-edit-btn');
      const alertElem = document.getElementById('edit-alert');
      
      const payload = {
        nisn: document.getElementById('edit-nisn').value,
        nama: document.getElementById('edit-nama').value,
        tgl_lahir: document.getElementById('edit-tgl-lahir').value,
        kelas: document.getElementById('edit-kelas').value,
        nilai_bindo: parseFloat(document.getElementById('edit-bindo').value) || 0,
        nilai_mtk: parseFloat(document.getElementById('edit-mtk').value) || 0,
        nilai_bing: parseFloat(document.getElementById('edit-bing').value) || 0,
        status: document.getElementById('edit-status').value
      };

      btn.disabled = true;
      btn.innerText = 'Menyimpan...';

      try {
        const res = await fetch(`http://127.0.0.1:3000/api/students/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        
        if (json.success) {
          alertElem.className = 'alert success';
          alertElem.innerText = '✅ Data berhasil diperbarui';
          alertElem.style.display = 'block';
          
          await fetchStudents(); // Refresh data
          
          setTimeout(() => {
            closeEditModal();
          }, 1000);
        } else {
          alertElem.className = 'alert error';
          alertElem.innerText = '❌ Gagal: ' + (json.message || 'Server error');
          alertElem.style.display = 'block';
        }
      } catch (err) {
        alertElem.className = 'alert error';
        alertElem.innerText = '❌ Kesalahan jaringan';
        alertElem.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerText = 'Simpan Perubahan';
      }
    });

    // Delete Logic
    window.deleteStudent = async function(id) {
      if (confirm('Apakah Anda yakin ingin menghapus data siswa ini? Tindakan ini tidak dapat dibatalkan.')) {
        await executeDelete(id);
      }
    };
    
    // Separate delete execution so browser tools can test it bypass if needed
    window.executeDelete = async function(id) {
      try {
        const res = await fetch(`http://127.0.0.1:3000/api/students/${id}`, {
          method: 'DELETE'
        });
        const json = await res.json();
        if (json.success) {
          fetchStudents();
        } else {
          alert('Gagal menghapus data: ' + json.message);
        }
      } catch (err) {
        alert('Kesalahan jaringan saat menghapus data');
      }
    };

    // Initial load
    fetchStudents();
  </script>
</body>
</html>
