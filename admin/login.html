<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - SICEPU</title>
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .admin-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg);
      padding: var(--space-4);
    }
    
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: var(--space-8);
      border-radius: var(--radius-xl);
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
    }
  </style>
</head>
<body class="admin-login">

  <div class="login-card">
    <div class="text-center mb-6">
      <i data-lucide="shield" class="text-primary mb-2 mx-auto" style="width: 48px; height: 48px;"></i>
      <h2 class="text-white">Panel Administrator</h2>
    </div>

    <form action="/admin/dashboard.html">
      <div class="mb-4">
        <label class="form-label text-sm text-white" for="username">Username:</label>
        <div style="position: relative;">
          <input type="text" id="username" class="form-control" style="padding-left: 2.5rem;" required>
          <i data-lucide="user" class="text-primary" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px;"></i>
        </div>
      </div>

      <div class="mb-6">
        <label class="form-label text-sm text-white" for="password">Password:</label>
        <div style="position: relative;">
          <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" required>
          <i data-lucide="lock" class="text-primary" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px;"></i>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full">
        <i data-lucide="log-in"></i> MASUK
      </button>
    </form>
    
    <div class="text-center mt-6">
      <p class="text-xs text-muted">&copy; 2026 SICEPU v1.0</p>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
